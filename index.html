<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPSTEIN AGENT</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
    cursor: crosshair;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #matrix-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.12;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 600px;
    width: 100%;
    padding: 60px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .top-badge {
    display: inline-block;
    background: #ff003c;
    color: #fff;
    font-family: 'Bangers', cursive;
    font-size: 14px;
    letter-spacing: 3px;
    padding: 4px 18px;
    animation: wiggle 3s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-1deg); }
    50% { transform: rotate(1deg); }
  }

  .title {
    font-family: 'Bangers', cursive;
    font-size: clamp(90px, 20vw, 160px);
    line-height: 0.85;
    letter-spacing: 4px;
    color: #00ff41;
    text-shadow: 6px 6px 0 #003a10, -2px -2px 0 #003a10, 2px -2px 0 #003a10, -2px 2px 0 #003a10;
    animation: glitch 5s infinite;
  }

  @keyframes glitch {
    0%, 92%, 100% { text-shadow: 6px 6px 0 #003a10; transform: none; }
    93% { text-shadow: -4px 0 #ff003c, 4px 0 #00ffff; transform: skewX(-3deg); }
    94% { text-shadow: 4px 0 #ff003c, -4px 0 #00ffff; transform: skewX(3deg); }
    95% { text-shadow: 6px 6px 0 #003a10; transform: none; }
  }

  .title-sub {
    font-family: 'Bangers', cursive;
    font-size: clamp(18px, 4vw, 26px);
    letter-spacing: 6px;
    color: #ffffff;
    opacity: 0.5;
    margin-top: -16px;
  }

  .logo-wrap {
    position: relative;
    display: inline-block;
  }

  .logo-img {
    width: 230px;
    height: 230px;
    object-fit: cover;
    image-rendering: pixelated;
    border-radius: 50%;
    border: 4px solid #00ff41;
    box-shadow: 0 0 0 5px #0a0a0a, 0 0 0 9px #00ff41, 0 0 50px rgba(0,255,65,0.4);
    display: block;
    animation: pulseGlow 3s ease-in-out infinite;
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 5px #0a0a0a, 0 0 0 9px #00ff41, 0 0 30px rgba(0,255,65,0.3); }
    50%       { box-shadow: 0 0 0 5px #0a0a0a, 0 0 0 9px #00ff41, 0 0 70px rgba(0,255,65,0.6); }
  }

  .sticker {
    position: absolute;
    font-family: 'Bangers', cursive;
    font-size: 14px;
    letter-spacing: 2px;
    padding: 4px 10px;
    box-shadow: 2px 2px 0 #000;
    white-space: nowrap;
  }

  .sticker-1 {
    top: -10px; right: -36px;
    background: #ffdd00; color: #000;
    transform: rotate(12deg);
    animation: bob1 2s ease-in-out infinite;
  }
  .sticker-2 {
    bottom: -10px; left: -36px;
    background: #ff003c; color: #fff;
    transform: rotate(-8deg);
    animation: bob2 2.4s ease-in-out infinite;
  }

  @keyframes bob1 { 0%,100%{transform:rotate(12deg) scale(1)} 50%{transform:rotate(12deg) scale(1.06)} }
  @keyframes bob2 { 0%,100%{transform:rotate(-8deg) scale(1)} 50%{transform:rotate(-8deg) scale(1.06)} }

  .caption {
    font-family: 'Bangers', cursive;
    font-size: clamp(22px, 5vw, 34px);
    letter-spacing: 2px;
    color: #ffdd00;
    text-shadow: 3px 3px 0 #000;
    line-height: 1.3;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.4s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>

<script>
const canvas = document.getElementById('matrix-bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const chars = '0123456789ABCDEF$EPSTEIN';
const cols = Math.floor(canvas.width / 18);
const drops = Array(cols).fill(1);
function draw() {
  ctx.fillStyle = 'rgba(10,10,10,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = '14px monospace';
  drops.forEach((y, i) => {
    ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 18, y * 16);
    if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(draw, 50);
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
